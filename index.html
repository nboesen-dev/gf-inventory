<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GF Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gf-green: #6abf4b;
  --gf-green-dim: #4a8f33;
  --gf-dark: #1c1c1e;
  --gf-card: #252528;
  --gf-card2: #2e2e32;
  --gf-border: #38383c;
  --gf-border2: #48484e;
  --gf-text: #f0f0f0;
  --gf-muted: #888;
  --gf-danger: #e05252;
  --gf-warn: #e09a30;
  --gf-ok: #6abf4b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--gf-text); background: var(--gf-dark); min-height: 100vh; }
.container { max-width: 820px; margin: 0 auto; padding: 0 1rem 2rem; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--gf-border); padding-bottom: 1rem; }
.logo img { height: 36px; width: auto; }
.sync-status { font-size: 11px; padding: 4px 10px; border-radius: 99px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.sync-status.ok      { background: rgba(106,191,75,0.15); color: var(--gf-green); border: 1px solid rgba(106,191,75,0.3); }
.sync-status.syncing { background: rgba(224,154,48,0.15); color: var(--gf-warn); border: 1px solid rgba(224,154,48,0.3); }
.sync-status.error   { background: rgba(224,82,82,0.15); color: var(--gf-danger); border: 1px solid rgba(224,82,82,0.3); }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--gf-border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tab { padding: 10px 14px; border: none; background: none; cursor: pointer; font-size: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gf-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; white-space: nowrap; flex-shrink: 0; }
.tab.active { color: var(--gf-green); border-bottom: 2px solid var(--gf-green); }
.tab:hover:not(.active) { color: var(--gf-text); }

/* Section */
.section { margin-bottom: 2rem; }
.section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--gf-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--gf-card); border-radius: 8px; overflow: hidden; border: 1px solid var(--gf-border); }
th { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--gf-border); color: var(--gf-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; background: var(--gf-card2); }
td { padding: 9px 12px; border-bottom: 1px solid var(--gf-border); color: var(--gf-text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.03); }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
.badge.ok     { background: rgba(106,191,75,0.15); color: var(--gf-green); border: 1px solid rgba(106,191,75,0.25); }
.badge.warn   { background: rgba(224,154,48,0.15); color: var(--gf-warn); border: 1px solid rgba(224,154,48,0.25); }
.badge.danger { background: rgba(224,82,82,0.15); color: var(--gf-danger); border: 1px solid rgba(224,82,82,0.25); }

/* Job form */
.job-form { background: var(--gf-card); border: 1px solid var(--gf-border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
.form-row { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--gf-muted); text-transform: uppercase; letter-spacing: 0.07em; }
input, select {
  width: 100%; font-size: 14px; padding: 8px 10px;
  border: 1px solid var(--gf-border2); border-radius: 6px;
  background: var(--gf-card2); color: var(--gf-text);
  font-family: 'Barlow', sans-serif; outline: none;
  transition: border-color 0.15s;
}
input:focus, select:focus { border-color: var(--gf-green); }
select option { background: var(--gf-card2); }

/* Buttons */
.btn { padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.15s; }
.btn-primary { background: var(--gf-green); color: #0f0f0f; border: none; }
.btn-primary:hover { background: #7dd45c; }
.btn-secondary { background: none; border: 1px solid var(--gf-border2); color: var(--gf-muted); }
.btn-secondary:hover { border-color: var(--gf-text); color: var(--gf-text); }

/* Result cards */
.result-card { background: var(--gf-card); border: 1px solid var(--gf-border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; border-left: 3px solid var(--gf-border2); }
.result-card.has-issues { border-left-color: var(--gf-danger); }
.result-card.all-good { border-left-color: var(--gf-green); }
.result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.result-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: 0.02em; }
.result-date { font-size: 12px; color: var(--gf-green); font-weight: 600; margin-bottom: 2px; }
.result-meta { font-size: 12px; color: var(--gf-muted); margin-top: 2px; }
.job-type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; margin-left: 6px; vertical-align: middle; }
.jt-standard { background: rgba(100,160,255,0.1); color: #78aeff; border: 1px solid rgba(100,160,255,0.2); }
.jt-outdoor  { background: rgba(106,191,75,0.1); color: var(--gf-green); border: 1px solid rgba(106,191,75,0.2); }
.jt-double   { background: rgba(224,154,48,0.1); color: var(--gf-warn); border: 1px solid rgba(224,154,48,0.2); }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (min-width: 641px) {
  .result-grid { grid-template-columns: 1fr 1fr 1fr; }
}
.result-item { background: var(--gf-card2); border-radius: 6px; padding: 10px; border: 1px solid var(--gf-border); }
.result-item-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: var(--gf-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
.result-item-val { font-size: 15px; font-weight: 600; }

/* Alerts */
.alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; border-left: 3px solid; }
.alert.warn   { background: rgba(224,154,48,0.08); color: var(--gf-warn); border-color: var(--gf-warn); }
.alert.danger { background: rgba(224,82,82,0.08); color: var(--gf-danger); border-color: var(--gf-danger); }
.alert.ok     { background: rgba(106,191,75,0.08); color: var(--gf-green); border-color: var(--gf-green); }
.alert.info   { background: rgba(100,160,255,0.08); color: #78aeff; border-color: #78aeff; }

/* Inventory inputs */
.edit-qty { width: 64px !important; text-align: center; }

/* Order guide */
.order-summary { background: var(--gf-card2); border-radius: 6px; padding: 14px; margin-top: 0.5rem; border: 1px solid var(--gf-border); }
.order-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--gf-border); }
.order-row:last-child { border-bottom: none; }
.order-row.total { font-weight: 700; padding-top: 10px; color: var(--gf-green); }
.chip-scroll { max-height: 400px; overflow-y: auto; }
.hint { font-size: 11px; color: var(--gf-muted); margin-top: 3px; }
.labor-crew-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (min-width: 641px) {
  .form-row { grid-template-columns: 1fr 1fr; }
}
.tint-note   { font-size: 12px; color: #78aeff; background: rgba(100,160,255,0.08); padding: 6px 10px; border-radius: 6px; margin-top: 8px; border: 1px solid rgba(100,160,255,0.15); }
.manual-note { font-size: 12px; color: var(--gf-warn); background: rgba(224,154,48,0.08); padding: 6px 10px; border-radius: 6px; margin-top: 8px; border: 1px solid rgba(224,154,48,0.15); }

/* Threshold bar */
.threshold-bar { margin-top: 1rem; padding: 14px; background: var(--gf-card2); border-radius: 6px; font-size: 13px; border: 1px solid var(--gf-border); }
.threshold-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
.threshold-label { color: var(--gf-muted); }
.threshold-val.hit  { color: var(--gf-green); font-weight: 700; }
.threshold-val.miss { color: var(--gf-danger); font-weight: 700; }
.na-item { opacity: 0.3; font-size: 13px; }
.loading { text-align: center; padding: 3rem; color: var(--gf-muted); font-size: 13px; }

/* Combined alerts */
.combined-box { background: var(--gf-card); border: 1px solid var(--gf-border); border-radius: 8px; padding: 1rem; margin-top: 1rem; }

/* Mobile utility classes */
.mob-stack { display: flex; flex-direction: column; gap: 12px; }

@media (max-width: 640px) {
  .container { padding: 0 0.75rem 2rem; }
  
  /* Tabs - scrollable on mobile */
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; gap: 0; padding-bottom: 0; }
  .tab { white-space: nowrap; padding: 10px 14px; font-size: 11px; flex-shrink: 0; }
  
  /* Forms - force single column on ALL grids inside forms */
  .form-row { grid-template-columns: 1fr !important; }
  .job-form { padding: 1rem; }
  .job-form .form-row > div { width: 100%; }
  #tab-cost .form-row { grid-template-columns: 1fr !important; }
  .labor-crew-row { grid-template-columns: 1fr 1fr; }
  
  /* Result cards */
  .result-grid { grid-template-columns: 1fr 1fr; }
  .result-card { padding: 1rem; }
  .result-name { font-size: 15px; }
  
  /* Inventory tables - hide less important cols */
  .inv-hide { display: none; }
  td, th { padding: 8px 8px; font-size: 12px; }
  .edit-qty { width: 52px !important; font-size: 13px; }
  
  /* Cost estimator */
  .result-item-val { font-size: 13px; }

  /* Header */
  .header { padding: 0.75rem 0; margin-bottom: 1rem; }
  .logo img { height: 28px; }
  .sync-status { font-size: 10px; padding: 3px 7px; }
  
  /* Buttons */
  .btn { padding: 10px 14px; font-size: 12px; }
  input, select { font-size: 16px !important; } /* prevents iOS zoom */
}


</style>
</head>

  <div id="tab-planner">
    <div id="planner-loading" class="loading">Loading inventory...</div>
    <div id="planner-content" style="display:none;">
      <div class="job-form">
        <div class="form-row">
          <div class="form-group">
            <label>Job name</label>
            <input type="text" id="job-name" placeholder="e.g. Smith residence" />
          </div>
          <div class="form-group">
            <label>Install date</label>
            <div style="display:grid;grid-template-columns:2fr 2fr 2fr;gap:6px;">
              <input type="number" id="date-month" placeholder="MM" min="1" max="12" style="text-align:center;" />
              <input type="number" id="date-day" placeholder="DD" min="1" max="31" style="text-align:center;" />
              <input type="number" id="date-year" placeholder="YY" min="0" max="99" style="text-align:center;" />
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Square footage</label>
            <input type="number" id="sqft" placeholder="e.g. 800" min="1" oninput="updateChipSuggestion()" />
          </div>
          <div class="form-group">
            <label>Job type</label>
            <select id="job-type" onchange="onJobTypeChange()">
              <option value="standard">Standard (indoor)</option>
              <option value="outdoor">Outdoor / UV</option>
              <option value="double">Double broadcast</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Chip color</label>
            <select id="chip-color" onchange="onChipChange()">
              <option value="">-- select chip --</option>
              <optgroup label="Standard series">
                <option>Autumn</option><option>Birch Bark</option><option>Blue Blend</option>
                <option>Buckskin</option><option>Burlap</option><option>Cabin Fever</option>
                <option>Camel</option><option>Cobblestone</option><option>Coldwater Canyon</option>
                <option>Creekbed</option><option>Dakota Trail</option><option>Denim</option>
                <option>Desert Storm</option><option>Dolphin</option><option>Domino</option>
                <option>Everest</option><option>Fireside</option><option>Garage Force Blend</option>
                <option>Gravel</option><option>Grizzly</option><option>Gunflint Trail</option>
                <option>Harvest</option><option>Himalayan</option><option>Lighthouse</option>
                <option>Nightfall</option><option>Phillips</option><option>Portabello</option>
                <option>Raven</option><option>Rocky Point</option><option>Saddle Tan</option>
                <option>Shoreline</option><option>Tan Blend</option><option>Terrazzo</option>
                <option>Tidal Wave</option><option>Victorian</option><option>Willow</option>
                <option>Wombat</option><option>Woodland</option><option>Zen Green</option>
              </optgroup>
              <optgroup label="Stone series">
                <option>Basalt</option><option>Carbon</option><option>Dolerite</option>
                <option>Feldspar</option><option>Garnet</option><option>Obsidian</option>
                <option>Pumice</option><option>Schist</option>
              </optgroup>
              <optgroup label="Stonebridge series">
                <option>Agate</option><option>Baskerville</option><option>Bethpage</option><option>Copperplate</option>
                <option>Phoenix</option><option>Pinehurst</option><option>Port Rush</option><option>Troon</option>
              </optgroup>
            </select>

            <select id="anchor-b-select">
              <option value="">-- select chip first --</option>
            </select>
          </div>
        </div>
        <div id="anchor-note"></div>
        <div id="double-override-row" style="display:none; margin-bottom:12px; margin-top:4px;">
          <div class="form-group">
            <label>Chip boxes &mdash; suggested: <span id="chip-suggestion" style="color:var(--gf-green);">—</span> <span style="color:var(--gf-muted);font-weight:400;">(override if needed)</span></label>

              <option>Feldspar</option><option>Garnet</option><option>Obsidian</option>
              <option>Pumice</option><option>Schist</option>
            </optgroup>

              <option>Agate</option><option>Baskerville</option><option>Bethpage</option>

              <option value="3" selected>3 workers</option>

<script>
const TOPCOAT_SQFT_PER_PAIR=1500,ANCHOR_A_SQFT=5000,ANCHOR_B_SQFT=2500,CHIP_BUFFER=30,OUTDOOR_ANCHOR_SQFT_PER_BUCKET=1733,FREE_SHIP=3000,FREE_LIFTGATE=5000;
const PRICES={"Anchor Coat A":445,"Anchor Coat B - Grey":445,"Anchor Coat B - Tan":445,"Anchor Coat B - Clear":445,"Top Coat A":600,"Top Coat B":600};
const MIN_BACKSTOCK={"Anchor Coat A":0,"Anchor Coat B - Grey":1,"Anchor Coat B - Tan":1,"Anchor Coat B - Clear":0,"Top Coat A":0,"Top Coat B":0};

function standardChipBoxes(s){return Math.max(1,Math.ceil((s-CHIP_BUFFER)/200));}
function doubleChipBoxes(s){if(s<=500)return 3;if(s<=650)return 4;if(s<=850)return 5;if(s<=950)return 6;if(s<=1100)return 7;return Math.ceil(s/150);}

const CHIP_MASTER={
  "Agate":{anchorB:"Anchor Coat B - Grey",tint:null},"Autumn":{anchorB:"Anchor Coat B - Tan",tint:null},
  "Basalt":{anchorB:"Anchor Coat B - Grey",tint:null},"Baskerville":{anchorB:"Anchor Coat B - Grey",tint:null},"Bethpage":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Birch Bark":{options:["Anchor Coat B - Clear|Mocha","Anchor Coat B - Clear|White"]},
  "Blue Blend":{anchorB:"Anchor Coat B - Grey",tint:null},"Buckskin":{anchorB:"Anchor Coat B - Tan",tint:null},
  "Burlap":{anchorB:"Anchor Coat B - Tan",tint:null},"Cabin Fever":{options:["Anchor Coat B - Grey|","Anchor Coat B - Tan|"]},
  "Camel":{anchorB:"Anchor Coat B - Tan",tint:null},"Carbon":{anchorB:"Anchor Coat B - Clear",tint:"Black"},
  "Cobblestone":{anchorB:"Anchor Coat B - Grey",tint:null},"Coldwater Canyon":{anchorB:"Anchor Coat B - Tan",tint:null},
  "Copperplate":{options:["Anchor Coat B - Tan|","Anchor Coat B - Grey|"]},"Creekbed":{anchorB:"Anchor Coat B - Clear",tint:"Mocha"},
  "Dakota Trail":{anchorB:"Anchor Coat B - Clear",tint:"Mocha"},"Denim":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Desert Storm":{anchorB:"Anchor Coat B - Tan",tint:null},"Dolerite":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Dolphin":{options:["Anchor Coat B - Grey|","Anchor Coat B - Tan|"]},"Domino":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Everest":{anchorB:"Anchor Coat B - Grey",tint:null},"Feldspar":{anchorB:"Anchor Coat B - Tan",tint:null},
  "Fireside":{anchorB:"Anchor Coat B - Tan",tint:null},"Garage Force Blend":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Garnet":{anchorB:"Anchor Coat B - Clear",tint:"Mocha"},"Gravel":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Grizzly":{anchorB:"Anchor Coat B - Tan",tint:null},"Gunflint Trail":{options:["Anchor Coat B - Clear|Mocha","Anchor Coat B - Clear|Black"]},
  "Harvest":{anchorB:"Anchor Coat B - Clear",tint:"Mocha"},"Himalayan":{anchorB:"Anchor Coat B - Tan",tint:null},
  "Lighthouse":{anchorB:"Anchor Coat B - Grey",tint:null},"Nightfall":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Obsidian":{anchorB:"Anchor Coat B - Clear",tint:"Mocha"},"Phillips":{options:["Anchor Coat B - Tan|","Anchor Coat B - Clear|Mocha"]},
  "Phoenix":{anchorB:"Anchor Coat B - Tan",tint:null},"Pinehurst":{anchorB:"Anchor Coat B - Grey",tint:null},"Port Rush":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Portabello":{anchorB:"Anchor Coat B - Clear",tint:"Mocha"},"Pumice":{anchorB:"Anchor Coat B - Tan",tint:null},
  "Raven":{anchorB:"Anchor Coat B - Clear",tint:"Black"},"Rocky Point":{options:["Anchor Coat B - Grey|","Anchor Coat B - Tan|"]},
  "Saddle Tan":{anchorB:"Anchor Coat B - Tan",tint:null},"Schist":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Shoreline":{anchorB:"Anchor Coat B - Tan",tint:null},"Tan Blend":{anchorB:"Anchor Coat B - Tan",tint:null},
  "Terrazzo":{options:["Anchor Coat B - Grey|","Anchor Coat B - Tan|"]},"Tidal Wave":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Troon":{anchorB:"Anchor Coat B - Grey",tint:null},"Victorian":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Willow":{anchorB:"Anchor Coat B - Clear",tint:"Mocha"},"Wombat":{anchorB:"Anchor Coat B - Grey",tint:null},
  "Woodland":{anchorB:"Anchor Coat B - Tan",tint:null},"Zen Green":{anchorB:"Anchor Coat B - Grey",tint:null}
};

const STONE=["Basalt","Carbon","Dolerite","Feldspar","Garnet","Obsidian","Pumice","Schist"];
const BRIDGE=["Agate","Baskerville","Bethpage","Copperplate","Phoenix","Pinehurst","Port Rush","Troon"];
function getSeries(n){if(STONE.includes(n))return"Stone";if(BRIDGE.includes(n))return"Stonebridge";return"Standard";}

let inventory={coatings:[],chips:[]},jobs=[];

function getCoatingQty(n){const c=inventory.coatings.find(x=>x.name===n);return c?c.qty:0;}
function getChipQty(n){const c=inventory.chips.find(x=>x.name===n);return c?c.qty:0;}
function getTopcoatPairs(){return Math.min(getCoatingQty("Top Coat A"),getCoatingQty("Top Coat B"));}
function parseOpt(o){const[sku,tint]=o.split("|");return{sku,tint:tint||null};}

function setSyncStatus(state,text){const el=document.getElementById("sync-status");el.className="sync-status "+state;el.textContent=text;}

function loadData(){
  setSyncStatus("syncing","Loading...");
  google.script.run
    .withSuccessHandler(function(r){
      const d=JSON.parse(r);
      inventory.coatings=d.coatings;inventory.chips=d.chips;jobs=d.jobs;
      setSyncStatus("ok","Synced");
      document.getElementById("planner-loading").style.display="none";
      document.getElementById("planner-content").style.display="block";
      renderJobs();
      if(document.getElementById("tab-inventory").style.display!=="none")renderInventoryTables();
      if(document.getElementById("tab-order").style.display!=="none")renderOrderGuide();
    })
    .withFailureHandler(function(e){setSyncStatus("error","Load failed");console.error(e);})
    .getInventory();
}

function jobMaterials(job){
  const{sqft,jobType,chipOverride}=job;
  let aA=0,aB=0,tc=0,ch=0;
  if(jobType==="standard"){aA=sqft/ANCHOR_A_SQFT;aB=sqft/ANCHOR_B_SQFT;tc=sqft/TOPCOAT_SQFT_PER_PAIR;ch=standardChipBoxes(sqft);}
  else if(jobType==="outdoor"){tc=sqft/OUTDOOR_ANCHOR_SQFT_PER_BUCKET+sqft/TOPCOAT_SQFT_PER_PAIR;ch=standardChipBoxes(sqft);}
  else if(jobType==="double"){aA=sqft/ANCHOR_A_SQFT;aB=sqft/ANCHOR_B_SQFT;tc=(sqft/TOPCOAT_SQFT_PER_PAIR)*2;ch=chipOverride||doubleChipBoxes(sqft);}
  return{aA,aB,tc,ch};
}

function projectedRemaining(sku){
  let used=0;
  jobs.forEach(job=>{
    const m=jobMaterials(job);
    if(sku==="Anchor Coat A")used+=m.aA;
    else if(sku===job.anchorBSku)used+=m.aB;
    else if(sku==="Top Coat A"||sku==="Top Coat B")used+=m.tc;
  });
  return getCoatingQty(sku)-used;
}
function projectedTC(){return Math.min(projectedRemaining("Top Coat A"),projectedRemaining("Top Coat B"));}

function updateChipSuggestion(){
  const s=parseFloat(document.getElementById("sqft").value),jt=document.getElementById("job-type").value;
  document.getElementById("chip-suggestion").textContent=(jt==="double"&&s>0)?doubleChipBoxes(s)+" boxes":"—";
}

function onJobTypeChange(){
  const jt=document.getElementById("job-type").value;
  document.getElementById("anchor-b-select").closest(".form-group").parentElement.style.display=jt==="outdoor"?"none":"grid";
  document.getElementById("outdoor-note").style.display=jt==="outdoor"?"block":"none";
  document.getElementById("double-override-row").style.display=jt==="double"?"block":"none";
  if(jt==="double")updateChipSuggestion();
}

function onChipChange(){
  const chip=document.getElementById("chip-color").value;
  const sel=document.getElementById("anchor-b-select");
  const note=document.getElementById("anchor-note");
  const lbl=document.getElementById("anchor-b-label");
  if(!chip||!CHIP_MASTER[chip]){sel.innerHTML="<option value=\'\'>-- select chip first --</option>";note.innerHTML="";lbl.textContent="Anchor B";return;}
  const entry=CHIP_MASTER[chip];
  if(entry.options){
    lbl.textContent="Anchor B — choose one";
    sel.innerHTML="<option value=\'\'>-- select --</option>"+entry.options.map(o=>{const{sku,tint}=parseOpt(o);return`<option value="${o}">${sku.replace("Anchor Coat B - ","")}${tint?" + "+tint:""}</option>`;}).join("");
    note.innerHTML='<div class="manual-note">Multiple anchor options &mdash; select above.</div>';
  } else {
    lbl.textContent="Anchor B (auto)";
    sel.innerHTML=`<option value="${entry.anchorB}|${entry.tint||""}">${entry.anchorB.replace("Anchor Coat B - ","")}${entry.tint?" + "+entry.tint:""}</option>`;
    note.innerHTML=entry.tint?`<div class="tint-note">Add <strong>${entry.tint}</strong> tint to Anchor B - Clear.</div>`:"";
  }
}


function buildChipOptions(selected){
  const groups={
    "Standard series":["Autumn","Birch Bark","Blue Blend","Buckskin","Burlap","Cabin Fever","Camel","Cobblestone","Coldwater Canyon","Creekbed","Dakota Trail","Denim","Desert Storm","Dolphin","Domino","Everest","Fireside","Garage Force Blend","Gravel","Grizzly","Gunflint Trail","Harvest","Himalayan","Lighthouse","Nightfall","Phillips","Portabello","Raven","Rocky Point","Saddle Tan","Shoreline","Tan Blend","Terrazzo","Tidal Wave","Victorian","Willow","Wombat","Woodland","Zen Green"],
    "Stone series":["Basalt","Carbon","Dolerite","Feldspar","Garnet","Obsidian","Pumice","Schist"],
    "Stonebridge series":["Agate","Baskerville","Bethpage","Copperplate","Phoenix","Port Rush","Troon"]
  };
  let html="<option value=''>-- select chip --</option>";
  Object.entries(groups).forEach(([grp,chips])=>{
    html+=`<optgroup label="${grp}">`+chips.map(c=>`<option value="${c}"${c===selected?" selected":""}>${c}</option>`).join("")+"</optgroup>";
  });
  return html;
}

function buildAnchorBOptions(chipName, selectedRaw){
  if(!chipName||!CHIP_MASTER[chipName])return"<option value=''>-- select chip first --</option>";
  const entry=CHIP_MASTER[chipName];
  if(entry.options){
    return "<option value=''>-- select --</option>"+entry.options.map(o=>{
      const{sku,tint}=parseOpt(o);
      return`<option value="${o}"${o===selectedRaw?" selected":""}>${sku.replace("Anchor Coat B - ","")}${tint?" + "+tint:""}</option>`;
    }).join("");
  } else {
    const val=entry.anchorB+"|"+(entry.tint||"");
    const lbl=entry.anchorB.replace("Anchor Coat B - ","")+(entry.tint?" + "+entry.tint:"");
    return`<option value="${val}" selected>${lbl}</option>`;
  }
}

function addJob(){
  const name=document.getElementById("job-name").value.trim();
  const sqft=parseFloat(document.getElementById("sqft").value);
  const chipColor=document.getElementById("chip-color").value;
  const jobType=document.getElementById("job-type").value;
  const mm=document.getElementById("date-month").value.trim();
  const dd=document.getElementById("date-day").value.trim();
  const yy=document.getElementById("date-year").value.trim();
  if(!mm||!dd||!yy){alert("Fill in all fields including install date.");return;}
  const fullYear=parseInt(yy)<100?(2000+parseInt(yy)):parseInt(yy);
  const installDate=`${fullYear}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
  if(!name||!sqft||!chipColor){alert("Fill in all fields.");return;}
  let anchorBSku=null,tint=null;
  if(jobType!=="outdoor"){
    const raw=document.getElementById("anchor-b-select").value;
    if(!raw){alert("Select an Anchor B color.");return;}
    const p=parseOpt(raw);anchorBSku=p.sku;tint=p.tint;
  } else {
    const e=CHIP_MASTER[chipColor];if(e&&!e.options)tint=e.tint;
  }
  const ov=parseInt(document.getElementById("chip-override").value);
  const chipOverride=(jobType==="double"&&ov>0)?ov:null;
  jobs.push({name,sqft,chipColor,jobType,anchorBSku,tint,chipOverride,installDate});
  jobs.sort((a,b)=>a.installDate<b.installDate?-1:a.installDate>b.installDate?1:0);
  document.getElementById("job-name").value="";
  document.getElementById("sqft").value="";
  document.getElementById("date-month").value="";
  document.getElementById("date-day").value="";
  document.getElementById("date-year").value="";
  document.getElementById("chip-color").value="";
  document.getElementById("job-type").value="standard";
  document.getElementById("anchor-b-select").innerHTML="<option value=\'\'>-- select chip first --</option>";
  document.getElementById("anchor-note").innerHTML="";
  document.getElementById("anchor-b-label").textContent="Anchor B";
  const ar=document.getElementById("anchor-b-select").closest(".form-group").parentElement;
  ar.style.display="grid";
  document.getElementById("outdoor-note").style.display="none";
  document.getElementById("double-override-row").style.display="none";
  document.getElementById("chip-override").value="";
  document.getElementById("chip-suggestion").textContent="—";
  renderJobs();persistJobs();
}

function removeJob(i){jobs.splice(i,1);renderJobs();persistJobs();}
function clearJobs(){if(!jobs.length)return;if(!confirm("Clear all jobs?"))return;jobs=[];renderJobs();persistJobs();}

function persistJobs(){
  setSyncStatus("syncing","Saving...");
  google.script.run
    .withSuccessHandler(()=>setSyncStatus("ok","Saved"))
    .withFailureHandler(()=>setSyncStatus("error","Save failed"))
    .saveJobs(JSON.stringify(jobs));
}

function formatDate(d){
  if(!d)return"";
  const[y,m,day]=d.split("-");
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return`${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

function startEditJob(i){
  const job=jobs[i];
  const card=document.getElementById("job-card-"+i);
  const[y,m,d]=job.installDate.split("-");
  const entry=CHIP_MASTER[job.chipColor]||{};
  const isOutdoor=job.jobType==="outdoor";
  const anchorBRaw=job.anchorBSku+(job.tint?"|"+job.tint:"|");
  const jts=["standard","outdoor","double"].map(t=>`<option value="${t}"${t===job.jobType?" selected":""}>${t==="standard"?"Standard (indoor)":t==="outdoor"?"Outdoor / UV":"Double broadcast"}</option>`).join("");
  card.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
      <div class="fg"><label>Job name</label><input id="ej-name-${i}" value="${job.name}"/></div>
      <div class="fg"><label>Install date (MM / DD / YY)</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
          <input type="number" id="ej-mm-${i}" value="${parseInt(m)}" min="1" max="12" style="text-align:center;"/>
          <input type="number" id="ej-dd-${i}" value="${parseInt(d)}" min="1" max="31" style="text-align:center;"/>
          <input type="number" id="ej-yy-${i}" value="${parseInt(y)%100}" min="0" max="99" style="text-align:center;"/>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
      <div class="fg"><label>Square footage</label><input type="number" id="ej-sqft-${i}" value="${job.sqft}"/></div>
      <div class="fg"><label>Job type</label><select id="ej-jt-${i}" onchange="onEditJobTypeChange(${i})">${jts}</select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
      <div class="fg"><label>Chip color</label><select id="ej-chip-${i}" onchange="onEditChipChange(${i})">${buildChipOptions(job.chipColor)}</select></div>
      <div class="fg" id="ej-anchor-group-${i}" style="${isOutdoor?"display:none":""}">
        <label id="ej-anchor-lbl-${i}">Anchor B</label>
        <select id="ej-anchor-${i}">${buildAnchorBOptions(job.chipColor,anchorBRaw)}</select>
      </div>
    </div>
    <div id="ej-outdoor-note-${i}" class="alert info" style="${isOutdoor?"":"display:none"}">Top coat used as anchor coat.</div>
    <div id="ej-double-row-${i}" style="${job.jobType==="double"?"":"display:none"};margin-bottom:10px;">
      <div class="fg"><label>Chip boxes override (suggested: ${doubleChipBoxes(job.sqft)})</label>
        <input type="number" id="ej-override-${i}" value="${job.chipOverride||""}" placeholder="auto" style="width:90px;"/>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn btn-primary" onclick="saveEditJob(${i})">Save</button>
      <button class="btn btn-secondary" onclick="renderJobs()">Cancel</button>
      <button class="btn btn-secondary" style="margin-left:auto;color:var(--gf-danger);border-color:var(--gf-danger);" onclick="removeJob(${i})">Remove</button>
    </div>`;
}

function onEditJobTypeChange(i){
  const jt=document.getElementById("ej-jt-"+i).value;
  document.getElementById("ej-anchor-group-"+i).style.display=jt==="outdoor"?"none":"";
  document.getElementById("ej-outdoor-note-"+i).style.display=jt==="outdoor"?"block":"none";
  document.getElementById("ej-double-row-"+i).style.display=jt==="double"?"block":"none";
}

function onEditChipChange(i){
  const chip=document.getElementById("ej-chip-"+i).value;
  const sel=document.getElementById("ej-anchor-"+i);
  const lbl=document.getElementById("ej-anchor-lbl-"+i);
  if(!chip||!CHIP_MASTER[chip]){sel.innerHTML="<option value=''>-- select chip first --</option>";return;}
  const entry=CHIP_MASTER[chip];
  if(entry.options){lbl.textContent="Anchor B — choose one";}
  else{lbl.textContent="Anchor B (auto)";}
  sel.innerHTML=buildAnchorBOptions(chip,"");
}

function saveEditJob(i){
  const mm=document.getElementById("ej-mm-"+i).value;
  const dd=document.getElementById("ej-dd-"+i).value;
  const yy=document.getElementById("ej-yy-"+i).value;
  const sqft=parseFloat(document.getElementById("ej-sqft-"+i).value);
  const name=document.getElementById("ej-name-"+i).value.trim();
  const jobType=document.getElementById("ej-jt-"+i).value;
  const chipColor=document.getElementById("ej-chip-"+i).value;
  if(!name||!sqft||!mm||!dd||!yy||!chipColor){alert("Fill in all fields.");return;}
  const fullYear=parseInt(yy)<100?(2000+parseInt(yy)):parseInt(yy);
  const installDate=`${fullYear}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
  let anchorBSku=null,tint=null;
  if(jobType!=="outdoor"){
    const raw=document.getElementById("ej-anchor-"+i).value;
    if(!raw){alert("Select an Anchor B color.");return;}
    const p=parseOpt(raw);anchorBSku=p.sku;tint=p.tint;
  } else {
    const e=CHIP_MASTER[chipColor];if(e&&!e.options)tint=e.tint;
  }
  const ov=parseInt(document.getElementById("ej-override-"+i)?.value||"");
  const chipOverride=(jobType==="double"&&ov>0)?ov:null;
  jobs[i]={name,sqft,chipColor,jobType,anchorBSku,tint,chipOverride,installDate};
  jobs.sort((a,b)=>a.installDate<b.installDate?-1:a.installDate>b.installDate?1:0);
  renderJobs();persistJobs();
}

function jtBadge(jt){
  if(jt==="outdoor")return'<span class="job-type-badge jt-outdoor">Outdoor/UV</span>';
  if(jt==="double")return'<span class="job-type-badge jt-double">Double BC</span>';
  return'<span class="job-type-badge jt-standard">Standard</span>';
}

function sb(have,need,dangerClass){
  const dc=dangerClass||"danger";
  if(have>=need)return'<span class="badge ok">Covered</span>';
  if(have>0)return'<span class="badge warn">Short</span>';
  return`<span class="badge ${dc}">Order now</span>`;
}

function renderJobs(){ 
  const el=document.getElementById("job-list"),ce=document.getElementById("combined-needs");
  if(!jobs.length){el.innerHTML='<p style="color:var(--gf-muted);font-size:13px;padding:0.5rem 0;">No jobs yet. Add one above.</p>';ce.innerHTML="";return;}
  let html="";
  jobs.forEach((job,i)=>{
    const m=jobMaterials(job);
    const chHave=getChipQty(job.chipColor),chShort=Math.max(0,m.ch-chHave);
    const abLabel=job.anchorBSku?(job.anchorBSku.replace("Anchor Coat B - ","")+(job.tint?" + "+job.tint:"")):"—";
    const tintNote=job.tint?`<div class="hint">Add ${job.tint} tint</div>`:"";
    const aArem=projectedRemaining("Anchor Coat A");
    const aBrem=job.anchorBSku?projectedRemaining(job.anchorBSku):null;
    const tcRem=projectedTC();
    const aAok=aArem>=(MIN_BACKSTOCK["Anchor Coat A"]||0);
    const aBok=aBrem===null||aBrem>=(MIN_BACKSTOCK[job.anchorBSku]||0);
    const tcOk=tcRem>=1;
    const hasIssues=!aAok||!aBok||!tcOk||chShort>0;

    const aAItem=job.jobType==="outdoor"

    const aBItem=job.jobType==="outdoor"
      ?'<div class="result-item na-item"><div class="result-item-label">Anchor B</div><div>Not used</div></div>'

    const tcLabel=job.jobType==="outdoor"?"Top coat (anchor + finish)":job.jobType==="double"?"Top coat pairs (×2)":"Top coat pairs";
    html+=`<div class="result-card ${hasIssues?"has-issues":"all-good"}" id="job-card-${i}">
      <div class="result-header">
        <div>
          <div class="result-date">${formatDate(job.installDate)}</div>
          <div class="result-name">${job.name} ${jtBadge(job.jobType)}</div>
          <div class="result-meta">${job.sqft.toLocaleString()} sq ft &middot; ${job.chipColor}${job.jobType!=="outdoor"?" &middot; Anchor B - "+abLabel:""}</div>
        </div>
        <button class="btn btn-secondary" style="font-size:11px;padding:5px 12px;" onclick="startEditJob(${i})">Edit</button>
      </div>
      <div class="result-grid">
        ${aAItem}${aBItem}
        <div class="result-item">
          <div class="result-item-label">${tcLabel}</div>
          <div class="result-item-val">${m.tc.toFixed(2)} pairs</div>
          <div style="margin-top:5px;">${tcOk?'<span class="badge ok">Covered</span>':"<span class=\"badge danger\">Order now</span>"} <span class="hint">${tcRem.toFixed(2)} left after all jobs</span></div>
        </div>
        <div class="result-item" style="grid-column:span 3;">
          <div class="result-item-label">Chips &mdash; ${job.chipColor}${job.jobType==="double"?" (double broadcast)":""}</div>

  el.innerHTML=html;
  if(jobs.length>1){

    ["Anchor Coat A","Anchor Coat B - Grey","Anchor Coat B - Tan","Anchor Coat B - Clear"].filter(s=>usedSkus.has(s)).forEach(sku=>{

function renderInventoryTables(){
  let html='<thead><tr><th>Product</th><th>On hand</th><th>Status</th><th>Update</th></tr></thead><tbody>';
  inventory.coatings.forEach(item=>{
    const min=MIN_BACKSTOCK[item.name]||0;
    const cls=item.qty===0?"danger":item.qty<=min?"warn":"ok";
    const lbl=item.qty===0?"Out":item.qty<=min?"Low":"OK";
    const isTC=item.name==="Top Coat A"||item.name==="Top Coat B";
    const hint=isTC?`<div class="hint">Pairs available: ${getTopcoatPairs()}</div>`:"";
    html+=`<tr><td>${item.name}${hint}</td><td>${item.qty} buckets</td><td><span class="badge ${cls}">${lbl}</span></td>
      <td><input class="edit-qty" type="number" min="0" step="0.5" value="${item.qty}" onchange="updateCoating('${item.name}',this.value)"/></td></tr>`;
  });
  html+="</tbody>";
  document.getElementById("coatings-table").innerHTML=html;
  html='<thead><tr><th>Color</th><th class="inv-hide">Series</th><th class="inv-hide">Anchor B</th><th>Boxes</th><th>Update</th></tr></thead><tbody>';
  inventory.chips.forEach(item=>{
    const e=CHIP_MASTER[item.name];
    const abl=e?(e.options?e.options.map(o=>{const{sku,tint}=parseOpt(o);return sku.replace("Anchor Coat B - ","")+(tint?"+"+tint:"");}).join(" or "):e.anchorB.replace("Anchor Coat B - ","")+(e.tint?"+"+e.tint:"")):"—";
    html+=`<tr><td>${item.name}</td><td class="inv-hide" style="color:var(--gf-muted);font-size:12px;">${getSeries(item.name)}</td>
      <td class="inv-hide" style="color:var(--gf-muted);font-size:12px;">${abl}</td>

function updateCoating(name,val){
  const v=parseFloat(val);if(isNaN(v)||v<0)return;
  const c=inventory.coatings.find(x=>x.name===name);if(c)c.qty=v;
  renderJobs();
  if(document.getElementById("tab-order").style.display!=="none")renderOrderGuide();
  setSyncStatus("syncing","Saving...");
  google.script.run.withSuccessHandler(()=>setSyncStatus("ok","Saved")).withFailureHandler(()=>setSyncStatus("error","Save failed")).updateCoating(name,v);
}

function updateChip(name,val){
  const v=parseFloat(val);if(isNaN(v)||v<0)return;
  const c=inventory.chips.find(x=>x.name===name);if(c)c.qty=v;
  renderJobs();
  setSyncStatus("syncing","Saving...");
  google.script.run.withSuccessHandler(()=>setSyncStatus("ok","Saved")).withFailureHandler(()=>setSyncStatus("error","Save failed")).updateChip(name,v);
}

function renderOrderGuide(){
  const el=document.getElementById("order-content");
  let orderItems=[];
  const sqftByAnchorB={};let totalAnchorASqft=0,totalTCSqft=0;
  jobs.forEach(j=>{
    if(j.jobType!=="outdoor"){totalAnchorASqft+=j.sqft;if(j.anchorBSku)sqftByAnchorB[j.anchorBSku]=(sqftByAnchorB[j.anchorBSku]||0)+j.sqft;}
    totalTCSqft+=j.sqft;
  });
  ["Anchor Coat A","Anchor Coat B - Grey","Anchor Coat B - Tan","Anchor Coat B - Clear"].forEach(sku=>{
    const rem=projectedRemaining(sku),min=MIN_BACKSTOCK[sku]||0;
    if(rem<min){
      const toOrder=Math.ceil(min-rem);
      const sqft=sku==="Anchor Coat A"?totalAnchorASqft:(sqftByAnchorB[sku]||0);
      orderItems.push({name:sku,toOrder,unit:"buckets",price:(PRICES[sku]||0)*toOrder,sqftNote:sqft.toLocaleString()+" sq ft scheduled"});
    }
  });
  const tcRem=projectedTC();
  if(tcRem<1){
    const toOrder=Math.ceil(1-tcRem);
    orderItems.push({name:"Top Coat A + B (pair)",toOrder,unit:"pairs",price:(PRICES["Top Coat A"]+PRICES["Top Coat B"])*toOrder,sqftNote:totalTCSqft.toLocaleString()+" sq ft scheduled"});
  }
  const chipTotals={};
  jobs.forEach(j=>{chipTotals[j.chipColor]=(chipTotals[j.chipColor]||0)+jobMaterials(j).ch;});
  const chipOrders=[];
  Object.entries(chipTotals).forEach(([color,need])=>{
    const have=getChipQty(color);
    if(need>have)chipOrders.push({color,need,have,short:Math.ceil(need-have)});
  });
  if(!orderItems.length&&!chipOrders.length){el.innerHTML='<div class="alert ok">Nothing to order &mdash; all backstock levels are good.</div>'+shippingNote(0);return;}
  const totalSqft=jobs.reduce((s,j)=>s+j.sqft,0);
  let subtotal=0,html="";
  if(totalSqft>0)html+=`<div style="margin-bottom:1rem;font-size:13px;color:var(--gf-muted);">${jobs.length} job${jobs.length>1?"s":""} scheduled &middot; <span style="color:var(--gf-text);">${totalSqft.toLocaleString()} total sq ft</span></div>`;
  if(orderItems.length){
    html+='<div class="section-title" style="margin-bottom:.5rem;">Coatings to order</div><div class="order-summary">';
    orderItems.forEach(item=>{
      subtotal+=item.price;
      html+=`<div class="order-row"><span>${item.name} <span style="font-size:11px;color:var(--gf-muted)">(${item.toOrder} ${item.unit} &middot; ${item.sqftNote})</span></span><span style="color:var(--gf-green);font-weight:600;">$${item.price.toLocaleString()}</span></div>`;
    });
    html+=`<div class="order-row total"><span>Subtotal</span><span>$${subtotal.toLocaleString()}</span></div></div>`;
  }
  html+=shippingNote(subtotal);
  if(chipOrders.length){
    html+='<div class="section-title" style="margin-top:1.5rem;margin-bottom:.5rem;">Chips to order (from current jobs)</div><div class="order-summary">';
    chipOrders.forEach(c=>{html+=`<div class="order-row"><span>${c.color} chips</span><span>order ${c.short} more (have ${c.have}, need ${c.need})</span></div>`;});
    html+="</div>";
  }
  el.innerHTML=html;
}

function shippingNote(total){
  const ship=total>=FREE_SHIP,lift=total>=FREE_LIFTGATE;
  const toShip=Math.max(0,FREE_SHIP-total),toLift=Math.max(0,FREE_LIFTGATE-total);
  const pairsToLift=Math.ceil(toLift/1200);
  return `<div class="threshold-bar">
    <div class="threshold-row"><span class="threshold-label">Free shipping ($${FREE_SHIP.toLocaleString()})</span><span class="threshold-val ${ship?"hit":"miss"}">${ship?"Reached":"$"+toShip.toLocaleString()+" away"}</span></div>
    <div class="threshold-row" style="margin-top:4px;"><span class="threshold-label">Free liftgate ($${FREE_LIFTGATE.toLocaleString()})</span><span class="threshold-val ${lift?"hit":"miss"}">${lift?"Reached":"$"+toLift.toLocaleString()+" away"}</span></div>
    ${!lift&&total>0?`<div class="hint" style="margin-top:8px;color:var(--gf-muted);">Add ${pairsToLift} top coat pair${pairsToLift>1?"s":""} ($${(pairsToLift*1200).toLocaleString()}) to hit free liftgate.</div>`:""}
  </div>`;
}

  ["planner","inventory","order","cost"].forEach(t=>{document.getElementById("tab-"+t).style.display=t===name?"block":"none";});
  document.querySelectorAll(".tab").forEach((el,i)=>{el.classList.toggle("active",["planner","inventory","order","cost"][i]===name);});

  if(name==="order")renderOrderGuide();
  if(name==="cost")runEstimator();

// ---- Job Cost Model ----
const COST_LABOR_HRS_PER_SQFT = 0.0295;
const COST_LABOR_RATE = 25;
const COST_OVERHEAD = 60;
const COST_ANCHOR_A_PER_SQFT = 445 / 5000;
const COST_ANCHOR_B_PER_SQFT = 445 / 2500;
const COST_TC_PER_SQFT = 1200 / 1500;
const COST_CHIP_STD_PER_SQFT = 94 / 465;
const COST_CHIP_BRIDGE_PER_SQFT = 124 / 465;
const STONE_SERIES = ["Basalt","Carbon","Dolerite","Feldspar","Garnet","Obsidian","Pumice","Schist"];
const STONEBRIDGE_SERIES = ["Agate","Baskerville","Bethpage","Copperplate","Phoenix","Pinehurst","Port Rush","Troon"];

function getChipCostPerSqft(chipColor) {
  if (STONEBRIDGE_SERIES.includes(chipColor)) return COST_CHIP_BRIDGE_PER_SQFT;
  return COST_CHIP_STD_PER_SQFT;
}

function calcJobCost(job) {
  const { sqft, jobType, chipColor } = job;
  const chipRate = getChipCostPerSqft(chipColor);
  let matCost = 0, laborCost = 0;
  laborCost = COST_LABOR_HRS_PER_SQFT * sqft * COST_LABOR_RATE;
  if (jobType === "standard") {
    matCost = (COST_ANCHOR_A_PER_SQFT + COST_ANCHOR_B_PER_SQFT + COST_TC_PER_SQFT + chipRate) * sqft;
  } else if (jobType === "outdoor") {
    // TC used as anchor + finish; no anchor A or B
    // TC as anchor: sqft/1733 pairs + TC finish: sqft/1500 pairs
    const tcCost = ((sqft / 1733) + (sqft / 1500)) * 1200;
    const chipCost = chipRate * sqft;
    matCost = tcCost + chipCost;
  } else if (jobType === "double") {
    // Anchor A + B same as standard; 2x TC (finish coat at 1300 sqft/pair)
    const tcPairs = (sqft / 1500) + (sqft / 1300);
    const tcCost = tcPairs * 1200;
    matCost = (COST_ANCHOR_A_PER_SQFT + COST_ANCHOR_B_PER_SQFT) * sqft + tcCost + chipRate * sqft;
  }
  return {
    labor: laborCost,
    materials: matCost,
    overhead: COST_OVERHEAD,
    total: laborCost + matCost + COST_OVERHEAD,
    costPerSqft: (laborCost + matCost + COST_OVERHEAD) / sqft
  };
}


function calcJobCostCustom(job, laborRate, overhead, crewSize) {
  const { sqft, jobType, chipColor } = job;
  const chipRate = getChipCostPerSqft(chipColor);
  let matCost = 0;
  const laborHrsPerWorker = Math.max(4.5, 2.882 + 0.003852 * sqft);
  const laborHrs = laborHrsPerWorker * crewSize;
  const laborCost = laborHrs * laborRate;
  if (jobType === "standard") {
    matCost = (COST_ANCHOR_A_PER_SQFT + COST_ANCHOR_B_PER_SQFT + COST_TC_PER_SQFT + chipRate) * sqft;
  } else if (jobType === "outdoor") {
    const tcCost = ((sqft / 1733) + (sqft / 1500)) * 1200;
    matCost = tcCost + chipRate * sqft;
  } else if (jobType === "double") {
    const tcPairs = (sqft / 1500) + (sqft / 1517);
    const tcCost = tcPairs * 1200;
    matCost = (COST_ANCHOR_A_PER_SQFT + COST_ANCHOR_B_PER_SQFT) * sqft + tcCost + chipRate * sqft;
  }
  const total = laborCost + matCost + overhead;
  return { labor: laborCost, materials: matCost, overhead, total, costPerSqft: total / sqft };
}

function onEstJobTypeChange() {
  const jt = document.getElementById("est-jobtype").value;
  document.getElementById("est-outdoor-note").style.display = jt === "outdoor" ? "block" : "none";
  runEstimator();
}

function runEstimator() {
  const sqft = parseFloat(document.getElementById("est-sqft").value);
  const jobType = document.getElementById("est-jobtype").value;
  const chipColor = document.getElementById("est-chip").value;
  const salePrice = parseFloat(document.getElementById("est-sale").value);
  const laborRate = parseFloat(document.getElementById("est-labor-rate").value) || COST_LABOR_RATE;
  const overhead = parseFloat(document.getElementById("est-overhead").value) || 0;
  const crewSize = parseInt(document.getElementById("est-crew").value) || 3;
  const el = document.getElementById("est-result");
  if (!sqft || sqft <= 0 || !chipColor) { el.innerHTML = ""; return; }
  const job = { sqft, jobType, chipColor };
  const c = calcJobCostCustom(job, laborRate, overhead, crewSize);
  const hasSale = salePrice > 0;
  const margin = hasSale ? salePrice - c.total : null;
  const marginPct = hasSale ? (margin / salePrice * 100) : null;
  const grossProfit = hasSale ? margin : null;
  const isHealthy = marginPct >= 55 && grossProfit >= 1500;
  const isFloor = marginPct < 40 || grossProfit < 1200;
  const marginColor = marginPct === null ? "var(--gf-muted)" : isHealthy ? "var(--gf-green)" : isFloor ? "var(--gf-danger)" : "var(--gf-warn)";
  const chipSeries = STONEBRIDGE_SERIES.includes(chipColor) ? "Stonebridge" : STONE_SERIES.includes(chipColor) ? "Stone" : "Standard";
  const hrsPerWorker = Math.max(4.5, 2.882 + 0.003852 * sqft).toFixed(1);
  const totalHrs = (parseFloat(hrsPerWorker) * crewSize).toFixed(1);
  el.innerHTML = `<div class="result-card all-good">
    <div class="result-header" style="margin-bottom:0.75rem;">
      <div>
        <div class="result-name">${sqft.toLocaleString()} sq ft ${jtBadge(jobType)}</div>
        <div class="result-meta">${chipColor} &middot; ${chipSeries} series</div>
      </div>
    </div>
    <div class="result-grid" style="margin-bottom:10px;">
      <div class="result-item">
        <div class="result-item-label">Labor</div>
        <div class="result-item-val">$${c.labor.toFixed(0)}</div>
        <div class="hint">${totalHrs} total hrs &middot; ${crewSize} workers &middot; $${laborRate}/hr</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Materials</div>
        <div class="result-item-val">$${c.materials.toFixed(0)}</div>
        <div class="hint">$${(c.materials/sqft).toFixed(2)}/sqft</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Overhead</div>
        <div class="result-item-val">$${overhead}</div>
        <div class="hint">Consumables, fuel, etc.</div>
      </div>
      <div class="result-item" style="grid-column:span 3;">
        <div class="result-item-label">Total job cost</div>
        <div class="result-item-val" style="color:var(--gf-warn);font-size:20px;">$${c.total.toFixed(0)}</div>
        <div class="hint">$${c.costPerSqft.toFixed(2)}/sqft</div>
      </div>
    </div>
    ${hasSale ? `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;" class="est-margin-grid">
      <div class="result-item">
        <div class="result-item-label">Sale price</div>
        <div class="result-item-val">$${salePrice.toLocaleString()}</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Gross profit</div>
        <div class="result-item-val" style="color:${marginColor};">$${margin.toFixed(0)}</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Margin</div>
        <div class="result-item-val" style="color:${marginColor};">${marginPct.toFixed(1)}%</div>
        <div class="hint">${isHealthy ? "Healthy" : isFloor ? "Below floor" : "Tight"}</div>
      </div>
    </div>` : ""}
  </div>`;
}


function applyMobileLayout() {
  const isMobile = window.innerWidth <= 640;
  if (!isMobile) return;

  // Container padding
  document.querySelector('.container').style.padding = '0 0.75rem 2rem';

  // Tabs - scrollable
  const tabs = document.querySelector('.tabs');
  if (tabs) {
    tabs.style.overflowX = 'auto';
    tabs.style.webkitOverflowScrolling = 'touch';
    tabs.style.flexWrap = 'nowrap';
  }
  document.querySelectorAll('.tab').forEach(t => {
    t.style.whiteSpace = 'nowrap';
    t.style.flexShrink = '0';
    t.style.fontSize = '11px';
    t.style.padding = '10px 12px';
  });

  // All form rows - single column
  document.querySelectorAll('.form-row').forEach(row => {
    row.style.gridTemplateColumns = '1fr';
  });

  // Labor crew row stays 2 col (rate + workers side by side)
  const laborRow = document.querySelector('.labor-crew-row');
  if (laborRow) laborRow.style.gridTemplateColumns = '1fr 1fr';

  // Result grids - 2 col
  document.querySelectorAll('.result-grid').forEach(g => {
    g.style.gridTemplateColumns = '1fr 1fr';
  });

  // Hide inventory series/anchor cols
  document.querySelectorAll('.inv-hide').forEach(el => {
    el.style.display = 'none';
  });

  // Table cells
  document.querySelectorAll('td, th').forEach(el => {
    el.style.padding = '8px';
    el.style.fontSize = '12px';
  });

  // Edit qty inputs
  document.querySelectorAll('.edit-qty').forEach(el => {
    el.style.width = '52px';
  });

  // Inputs font size 16px prevents iOS zoom
  document.querySelectorAll('input, select').forEach(el => {
    el.style.fontSize = '16px';
  });

  // Logo
  const logoImg = document.querySelector('.logo img');
  if (logoImg) logoImg.style.height = '28px';
}

// Run on load and after any tab switch or render
function applyMobileAfterRender() {
  setTimeout(applyMobileLayout, 50);
}

window.addEventListener('resize', applyMobileLayout);

loadData();
applyMobileAfterRender();
</script>
</body>
</html>
